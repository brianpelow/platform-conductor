name: Nightly health check
on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
permissions:
  contents: write
  issues: write
jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
      - name: Run health check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: uv run python scripts/nightly_health_check.py
      - name: Commit health report
        run: |
          git config user.name "platform-conductor[bot]"
          git config user.email "conductor@platform"
          git add -A
          git diff --staged --quiet || git commit -m "chore(conductor): nightly health check $(date -u +%Y-%m-%d)"
          git push
