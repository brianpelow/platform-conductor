name: Weekly platform report
on:
  schedule:
    - cron: "0 8 * * MON"
  workflow_dispatch:
permissions:
  contents: write
  discussions: write
  issues: write
jobs:
  weekly-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
      - name: Generate and post weekly report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: uv run python scripts/weekly_report.py
      - name: Commit report
        run: |
          git config user.name "platform-conductor[bot]"
          git config user.email "conductor@platform"
          git add -A
          git diff --staged --quiet || git commit -m "chore(conductor): weekly report $(date -u +%Y-%m-%d)"
          git push
